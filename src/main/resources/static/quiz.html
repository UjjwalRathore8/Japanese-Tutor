
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quiz | Learning Platform</title>
    
    <!-- CSS link for Spring Boot static folder -->
    <link rel="stylesheet" href="/css/quiz.css">
</head>
<body>
<div class="quiz-container">
    <!-- Navigation Bar -->
    <div class="nav-bar">
        <div class="logo-area">
            <span class="logo-icon">📝</span>
            <span class="logo-text">Quiz Center</span>
        </div>
        <div class="nav-buttons">
            <button class="btn-nav" id="dashboardBtn">← Dashboard</button>
            <button class="btn-nav btn-logout" id="logoutBtn">Logout</button>
        </div>
    </div>

    <!-- Main Quiz Content Area -->
    <div id="quizContentArea">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading quiz questions...</div>
        </div>
    </div>

    <div class="quiz-footer">
        &copy; 2025 Learning Platform
    </div>
</div>

<!-- JavaScript link for Spring Boot static folder -->
<script src="/js/quiz.js"></script>
</body>
</html>
