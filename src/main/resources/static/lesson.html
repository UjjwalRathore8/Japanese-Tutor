
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lesson | Learning Platform</title>
    
    <!-- CSS link for Spring Boot static folder -->
    <link rel="stylesheet" href="/css/lesson.css">
</head>
<body>
<div class="lesson-container">
    <!-- Navigation Bar -->
    <div class="nav-bar">
        <div class="logo-area">
            <span class="logo-icon">📘</span>
            <span class="logo-text">Learning Center</span>
        </div>
        <div class="nav-buttons">
            <button class="btn-nav" id="dashboardBtn">← Dashboard</button>
            <button class="btn-nav btn-logout" id="logoutBtn">Logout</button>
        </div>
    </div>

    <!-- Lesson Content Area -->
    <div id="lessonContentArea">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading lesson content...</div>
        </div>
    </div>

   
</div>

<!-- JavaScript link for Spring Boot static folder -->
<script src="/js/lesson.js"></script>

</html>
