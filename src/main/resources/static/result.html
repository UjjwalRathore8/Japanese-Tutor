
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Results - Assessment Dashboard</title>
    
    <!-- CSS link for Spring Boot static folder -->
    <link rel="stylesheet" href="/css/result.css">
</head>
<body>

<div class="results-container">
    <div class="results-header">
        <h2>My Assessment Results</h2>
        <p>Your performance history</p>
    </div>

    <div class="results-content">
        <div id="result">
            <div class="loading-state">Loading your results...</div>
        </div>
    </div>

    <div class="results-footer">
        <span>&copy; Assessment System</span>
        <a href="/quiz.html" class="back-link">← Take another quiz</a>
    </div>
</div>

<!-- JavaScript link for Spring Boot static folder -->
<script src="/js/result.js"></script>
</body>
</html>
